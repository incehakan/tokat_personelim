// android/app/build.gradle

plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
    id 'com.google.gms.google-services'
    // Flutter'ın yeni Plugin‑DSL'i
    id 'dev.flutter.flutter-gradle-plugin'
}

// 1) local.properties'i yükle
def localProperties = new java.util.Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localProperties.load(localPropertiesFile.newDataInputStream())
}

// 2) Versiyon bilgilerini al (yoksa varsayılan)
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// 3) Flutter SDK yolunu al, yoksa hata fırlat
def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new RuntimeException(
      "Flutter SDK not found. Define location with flutter.sdk in the local.properties file."
    )
}

// (Not: Plugin‑DSL'de apply from flutter.gradle gerekmez çünkü
//  id 'dev.flutter.flutter-gradle-plugin' zaten yüklüyor.)

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.tokat.tokatpersonelim"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.tokat.tokatpersonelim"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storePassword keystoreProperties['storePassword']
            storeFile keystorePropertiesFile.exists()
                ? rootProject.file(keystoreProperties['storeFile'])
                : null
        }
    }

    buildTypes {
        release {
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    lintOptions {
        disable 'InvalidPackage'
    }
}

flutter {
    source '../..'
}

dependencies {
    // Explicit embedding artifacts avoid unresolved FlutterActivity on newer toolchains.
    def flutterEngineVersion = "1.0.0-1527ae0ec577a4ef50e65f6fefcfc1326707d9bf"
    debugImplementation "io.flutter:flutter_embedding_debug:${flutterEngineVersion}"
    profileImplementation "io.flutter:flutter_embedding_profile:${flutterEngineVersion}"
    releaseImplementation "io.flutter:flutter_embedding_release:${flutterEngineVersion}"

    // Java 8+ özellikleri için desugaring
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    // Diğer bağımlılıklarınız
    implementation 'com.google.android.gms:play-services-vision:20.1.3'
    implementation 'androidx.appcompat:appcompat:1.3.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
}
