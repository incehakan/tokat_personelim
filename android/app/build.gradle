// android/app/build.gradle

plugins {
    id 'com.android.application'
    id 'kotlin-android'
    // Flutter'ın yeni Plugin‑DSL'i
    id 'dev.flutter.flutter-gradle-plugin'
}

// 1) local.properties'i yükle
def localProperties = new java.util.Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localProperties.load(localPropertiesFile.newDataInputStream())
}

// 2) Versiyon bilgilerini al (yoksa varsayılan)
def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

// 3) Flutter SDK yolunu al, yoksa hata fırlat
def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new RuntimeException(
      "Flutter SDK not found. Define location with flutter.sdk in the local.properties file."
    )
}

// (Not: Plugin‑DSL'de apply from flutter.gradle gerekmez çünkü
//  id 'dev.flutter.flutter-gradle-plugin' zaten yüklüyor.)

android {
    namespace "com.karabaglar.karabaglarpersonelim"
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.karabaglar.karabaglarpersonelim"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Debug imzası ile test edilebilir
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }

    lintOptions {
        disable 'InvalidPackage'
    }
}

flutter {
    source '../..'
}

dependencies {
    // Java 8+ özellikleri için desugaring
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.0'
    // Kotlin standard kütüphanesi
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    // Diğer bağımlılıklarınız
    implementation 'com.google.android.gms:play-services-vision:20.1.3'
    implementation 'androidx.appcompat:appcompat:1.3.0'
    implementation 'androidx.legacy:legacy-support-v4:1.0.0'
}
